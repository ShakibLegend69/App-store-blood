backend:
  name: git-gateway
  branch: main

media_folder: "apks"
public_folder: "/apks"

collections:
  - name: "apps"
    label: "Apps"
    folder: "apps"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "App Name", name: "title", widget: "string"}
      - {label: "Category", name: "category", widget: "select", options: ["Social", "Payment", "Shopping", "Games", "Tools", "Entertainment"]}
      - {label: "Icon URL", name: "icon", widget: "image"}
      - {label: "APK File", name: "apk", widget: "file"}
      - {label: "Rating", name: "rating", widget: "number", default: 4.5, value_type: "float", min: 0, max: 5, step: 0.1}
      - {label: "Downloads", name: "downloads", widget: "string", default: "1K+"}
      - {label: "Description", name: "body", widget: "markdown"}
